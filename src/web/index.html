<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTH - Product Tasks Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <div class="logo">PTH</div>
        <div class="logo-sub">Product Tasks Helper</div>
      </div>

      <div class="nav-section">
        <div class="nav-label">Jira</div>
        <a href="#jira-dashboard" class="nav-item active" data-view="jira-dashboard">
          <i data-lucide="radar" class="nav-icon"></i> Jira Dashboard
        </a>
        <a href="#jira-all-data" class="nav-item" data-view="jira-all-data">
          <i data-lucide="table" class="nav-icon"></i> Jira All Data
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-label">CSV</div>
        <a href="#csv-dashboard" class="nav-item" data-view="csv-dashboard">
          <i data-lucide="layout-dashboard" class="nav-icon"></i> CSV Dashboard
        </a>
        <a href="#csv-all-data" class="nav-item" data-view="csv-all-data">
          <i data-lucide="table-2" class="nav-icon"></i> CSV All Data
        </a>
        <div id="csv-list-nav" class="csv-list-nav"></div>
      </div>

      <div class="nav-section nav-bottom">
        <div class="nav-label">Data</div>
        <button class="nav-item upload-btn" id="upload-btn">
          <i data-lucide="upload" class="nav-icon"></i> Upload CSV
        </button>
        <input type="file" id="csv-input" accept=".csv" hidden>
      </div>
    </nav>

    <!-- Main content -->
    <main class="content">
      <!-- Top bar -->
      <header class="topbar">
        <h1 class="page-title" id="page-title">Jira Dashboard</h1>
        <div class="topbar-right">
          <button type="button" class="icon-btn topbar-icon-btn" id="jira-settings-btn" aria-label="Jira settings" title="Jira settings">
            <i data-lucide="settings" class="nav-icon"></i>
          </button>
          <span class="backlog-badge" id="backlog-badge">No data</span>
        </div>
      </header>

      <!-- Drop zone overlay -->
      <div class="drop-zone" id="drop-zone">
        <div class="drop-zone-content">
          <i data-lucide="file-up" style="width:48px;height:48px;margin-bottom:12px"></i>
          <p>Drop your CSV file here</p>
        </div>
      </div>

      <!-- View container -->
      <div class="view-container" id="view-container">
        <div class="empty-state" id="empty-state">
          <i data-lucide="file-spreadsheet" style="width:64px;height:64px;opacity:0.5;margin-bottom:16px"></i>
          <h2>No CSV uploaded</h2>
          <p>Upload a CSV file or drop it anywhere on the page to get started.</p>
          <button class="btn btn-primary" id="empty-upload-btn">Upload CSV</button>
        </div>
      </div>
    </main>
  </div>
  <div id="modal-root"></div>

  <script type="module" src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
